name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nix:
    name: nix flake check + build + VM test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The NixOS VM test (checks.vm-test) boots QEMU; expose /dev/kvm so it runs with
      # hardware acceleration instead of falling back to slow TCG emulation.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      # Builds every check, including the VM boot test (checks.vm-test).
      - name: nix flake check
        run: nix flake check --print-build-logs
      - name: nix build
        run: nix build .#default --print-build-logs

  cargo:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      # Run cargo hygiene inside the dev shell so the GTK4/libadwaita system libs
      # (needed by the gui crate) are present.
      - run: nix develop --command cargo fmt --all --check
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      # Includes the simulated-tuxedo_io model-matrix suite (tuxedoio::sim): per-model
      # write-gating, fan scaling, perf enforcement, caps + daemon fan-curve/sysfs unit tests.
      - run: nix develop --command cargo test --workspace

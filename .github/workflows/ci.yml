name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nix:
    name: nix flake check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: nix flake check
        run: nix flake check --print-build-logs
      - name: nix build
        run: nix build .#default --print-build-logs

  cargo:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      # Run cargo hygiene inside the dev shell so the GTK4/libadwaita system libs
      # (needed by the gui crate) are present.
      - run: nix develop --command cargo fmt --all --check
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - run: nix develop --command cargo test --workspace
